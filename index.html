<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; margin: 0; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.toast-in { animation: toastSlide 0.3s ease; }
@keyframes toastSlide { from { transform: translateX(110%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.modal-bg { position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem; }
.modal-card { background:white;border-radius:14px;max-width:660px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.25); }
.dark .modal-card { background:#1A2E47;color:#e2e8f0; }
.col-w { min-width:272px;max-width:272px; }
.bar { transition: width 0.7s cubic-bezier(.4,0,.2,1); }
.tip { position:relative; }
.tip:hover .tip-box { display:block; }
.tip-box { display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1E3A5F;color:white;font-size:11px;padding:5px 9px;border-radius:6px;white-space:nowrap;z-index:200;pointer-events:none; }
.tip-box::after { content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1E3A5F; }
.drag-over { background:rgba(200,169,81,0.08)!important; outline:2px dashed #C8A951; outline-offset:-2px; border-radius:12px; }
.dragging { opacity:0.45; transform:rotate(1.5deg) scale(0.98); }
.undo-btn { background:white; border:2px solid #C8A951; color:#1E3A5F; font-weight:700; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; transition:all 0.15s; }
.undo-btn:hover:not(:disabled) { background:#C8A951; color:white; }
.undo-btn:disabled { opacity:0.3; cursor:not-allowed; border-color:#e2e8f0; }
.dark .undo-btn { background:#1A2E47; border-color:#C8A951; color:#e2e8f0; }
.dark .undo-btn:hover:not(:disabled) { background:#C8A951; color:#1E3A5F; }
@media print {
  .no-print { display:none!important; }
  body { background:white!important; color:#1E3A5F!important; }
  .print-only { display:block!important; }
}
.print-only { display:none; }
input[type=range] { accent-color: #C8A951; }
.card-hover { transition: box-shadow 0.15s, transform 0.1s; }
.card-hover:hover { box-shadow: 0 4px 16px rgba(30,58,95,0.10); transform: translateY(-1px); }
</style>

// ── REDUCER ─────────────────────────────────────────────────
const MAX_UNDO = 50;
const INIT_PRESENT = { tasks:SEED, milestones:MILESTONES_SEED, recycleBin:[], checkpoints:[], budget:BUDGET_INIT };

function reducer(state,action) {
  const {past,present,future}=state;
  function push(newPresent) {
    const newPast=[...past,present].slice(-MAX_UNDO);
    return {past:newPast,present:newPresent,future:[]};
  }
  switch(action.type) {
    case 'UNDO': if(!past.length)return state; return {past:past.slice(0,-1),present:past[past.length-1],future:[present,...future]};
    case 'REDO': if(!future.length)return state; return {past:[...past,present],present:future[0],future:future.slice(1)};
    case 'LOAD': return {past:[],present:{...INIT_PRESENT,...action.state},future:[]};
    case 'ADD_TASK': return push({...present,tasks:[...present.tasks,{...action.task,history:[{savedAt:new Date().toISOString(),snapshot:{...action.task}}]}]});
    case 'UPDATE_TASK': {
      const old=present.tasks.find(t=>t.id===action.task.id);
      const hist=[...(old?.history||[]),{savedAt:new Date().toISOString(),snapshot:{...old}}].slice(-10);
      return push({...present,tasks:present.tasks.map(t=>t.id===action.task.id?{...action.task,history:hist}:t)});
    }
    case 'MOVE_TASK': return push({...present,tasks:present.tasks.map(t=>t.id===action.id?{...t,status:action.status}:t)});
    case 'SOFT_DELETE': {
      const t=present.tasks.find(x=>x.id===action.id);
      if(!t)return state;
      return push({...present,tasks:present.tasks.filter(x=>x.id!==action.id),recycleBin:[...present.recycleBin,{...t,deletedAt:new Date().toISOString()}]});
    }
    case 'RESTORE_TASK': {
      const t=present.recycleBin.find(x=>x.id===action.id);
      if(!t)return state;
      const {deletedAt,...task}=t;
      return push({...present,tasks:[...present.tasks,task],recycleBin:present.recycleBin.filter(x=>x.id!==action.id)});
    }
    case 'PURGE_TASK': return push({...present,recycleBin:present.recycleBin.filter(x=>x.id!==action.id)});
    case 'EMPTY_BIN': return push({...present,recycleBin:[]});
    case 'BULK_COMPLETE': return push({...present,tasks:present.tasks.map(t=>action.ids.includes(t.id)?{...t,status:'complete',progress:100}:t)});
    case 'BULK_REMOVE': {
      const removed=present.tasks.filter(t=>action.ids.includes(t.id)).map(t=>({...t,deletedAt:new Date().toISOString()}));
      return push({...present,tasks:present.tasks.filter(t=>!action.ids.includes(t.id)),recycleBin:[...present.recycleBin,...removed]});
    }
    case 'ADD_MILESTONE': return push({...present,milestones:[...present.milestones,{id:uid(),name:S(action.name),color:action.color||'#94a3b8'}]});
    case 'RENAME_MILESTONE': return push({...present,milestones:present.milestones.map(m=>m.id===action.id?{...m,name:S(action.name)}:m)});
    case 'DELETE_MILESTONE': return push({...present,milestones:present.milestones.filter(m=>m.id!==action.id),tasks:present.tasks.map(t=>t.milestone===action.id?{...t,milestone:'m7'}:t)});
    case 'ADD_CHECKPOINT': {
      const cp={id:uid(),savedAt:nowCDT(),snapshot:{...present}};
      return {...state,present:{...present,checkpoints:[cp,...present.checkpoints].slice(0,5)}};
    }
    case 'RESTORE_CP': return push({...action.snapshot});
    case 'UPDATE_BUDGET_YTD': return push({...present,budget:{...present.budget,committees:present.budget.committees.map(c=>c.code===action.code?{...c,[action.field]:action.value}:c)}});
    default: return state;
  }
}

function useToast() {
  const [toasts,setToasts]=useState([]);
  const show=useCallback((msg,type='success')=>{
    const id=uid();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  },[]);
  return {toasts,show};
}
function Toasts({toasts}) {
  return <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none">
    {toasts.map(t=>(

    ))}
  </div>;
}

// ── TASK BADGE ───────────────────────────────────────────────
function TaskBadge({task}) {
  const days = daysUntil(task.due);
  if(task.status==='complete') return null;
  if(task.due && days !== null && days < 0) return <span className="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded-full font-bold">🔴 Overdue</span>;
  if(task.due && days !== null && days <= 7) return <span className="text-xs bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded-full font-bold">🟡 Due Soon</span>;
  if(task.due && task.progress===0) { const d=new Date(task.due+'T12:00:00'); if((Date.now()-d)>14*86400000) return <span className="text-xs bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded-full font-bold">⚫ Stale</span>; }
  return null;

// ── CSV EXPORT ───────────────────────────────────────────────
function exportCSV(tasks,milestones) {
  const ms = Object.fromEntries(milestones.map(m=>[m.id,m.name]));
  const cols = ['Title','Task Owner','Due Date','Priority','Deliverable Status','Milestone','Progress %','Notes'];
  const rows = tasks.map(t=>[
    '"'+(t.title||'').replace(/"/g,'""')+'"',
    '"'+(t.owner||'').replace(/"/g,'""')+'"',
    t.due||'',
    t.priority||'',
    COLS.find(c=>c.id===t.status)?.label||t.status,
    '"'+(ms[t.milestone]||'Unassigned').replace(/"/g,'""')+'"',
    t.progress||0,
    '"'+(t.notes||'').replace(/"/g,'""')+'"',
  ].join(','));
  const csv = '\uFEFF' + [cols.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = 'NFBPA_Tasks_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

  const totalYTDInc = bs.committees.reduce((s,c)=>s+(c.ytdInc||0),0);
  const netProjected = totalInc - totalExp;
  const projYearEnd = bs.startingBalance + netProjected;

    </div>

    {/* KPI Tiles */}
    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">
      {[
        {label:'Starting Balance',value:fmt$(bs.startingBalance),sub:'Unity Bank · 2026',color:'text-[#1E3A5F] dark:text-gray-100'},
        {label:'2026 Income Budget',value:fmt$(totalInc),sub:`${totalInc>0?Math.round(totalYTDInc/totalInc*100):0}% collected YTD`,color:'text-green-600',bar:totalInc>0?Math.round(totalYTDInc/totalInc*100):0,barColor:'#22c55e'},
        {label:'2026 Expense Budget',value:fmt$(totalExp),sub:`${totalExp>0?Math.round(totalYTDExp/totalExp*100):0}% spent YTD`,color:'text-red-500',bar:totalExp>0?Math.round(totalYTDExp/totalExp*100):0,barColor:'#ef4444'},
        {label:'Projected Net',value:fmt$(netProjected),sub:`Year-end balance: ${fmt$(projYearEnd)}`,color:netProjected>=0?'text-[#C8A951]':'text-red-500'},
      ].map(k=>(
        <div key={k.label} className="bg-white dark:bg-[#1A2E47] rounded-xl border border-[#E2E8F0] dark:border-[#2D4A6B] p-4 shadow-sm">
          <div className="text-xs text-gray-400 mb-1">{k.label}</div>
          <div className={`text-xl font-bold ${k.color}`}>{k.value}</div>
          {k.bar !== undefined && <div className="mt-2"><ProgressBar value={k.bar} color={k.barColor}/></div>}
          <div className="text-xs text-gray-400 mt-1">{k.sub}</div>
        </div>
      ))}
    </div>

    <div className="mb-2 px-1 text-xs text-gray-400">Click any committee row to expand. Click <strong>Update YTD</strong> to enter actual figures.</div>

    <div className="bg-white dark:bg-[#1A2E47] rounded-xl border border-[#E2E8F0] dark:border-[#2D4A6B] shadow-sm mb-4 overflow-hidden">
      <div className="px-5 py-3 border-b border-gray-100 dark:border-[#2D4A6B] flex items-center justify-between">
        <h3 className="font-bold text-[#1E3A5F] dark:text-gray-100 text-sm">2026 Budget by Committee</h3>
        <span className="text-xs text-gray-400">Total: Exp {fmt$(totalExp)} · Inc {fmt$(totalInc)}</span>
      </div>
      {bs.committees.map(c=>{
        const maxExp = Math.max(...bs.committees.map(x=>x.exp2026));
        const barW = maxExp>0?Math.round((c.exp2026/maxExp)*100):0;
        const ytdExpPct = c.exp2026>0?Math.round(((c.ytdExp||0)/c.exp2026)*100):0;
        const ytdIncPct = c.inc2026>0?Math.round(((c.ytdInc||0)/c.inc2026)*100):0;
        const isOpen = open===c.code;
        const color = COMMITTEE_COLORS[c.code]||'#94a3b8';
        return <div key={c.code} className="border-b border-gray-50 dark:border-[#2D4A6B] last:border-0">
          <button className="w-full flex items-center gap-3 px-5 py-3.5 hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors text-left"
            onClick={()=>setOpen(isOpen?null:c.code)}>
            <span className="w-9 h-9 rounded-xl flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:color}}>{c.code}</span>
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-sm font-semibold text-[#1E3A5F] dark:text-gray-100">{c.name}</span>
                <div className="flex gap-4 text-xs flex-shrink-0 ml-2">
                  <span className="text-red-500 font-medium">Exp: {fmt$(c.exp2026)}</span>
                  {c.inc2026>0 && <span className="text-green-600 font-medium">Inc: {fmt$(c.inc2026)}</span>}
                </div>
              </div>
              <div className="flex items-center gap-2">
                <div className="flex-1 bg-gray-100 dark:bg-[#2D4A6B] rounded-full h-1.5 overflow-hidden">
                  <div className="h-1.5 rounded-full" style={{width:barW+'%',background:color}}></div>
                </div>
                {ytdExpPct>0 && <span className="text-xs text-gray-400 flex-shrink-0">{ytdExpPct}% spent</span>}
              </div>
            </div>
            <span className="text-gray-400 text-xs ml-2">{isOpen?'▲':'▼'}</span>
          </button>
          {isOpen && <div className="px-5 pb-4 bg-gray-50 dark:bg-[#0F1F33]">
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 pt-3">
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Expenses</p>
                  {editYTD&&editYTD.code===c.code&&editYTD.field==='ytdExp' ? (
                    <div className="flex items-center gap-1">
                      <input type="number" className="w-24 text-xs border rounded-lg px-2 py-1 dark:bg-[#1A2E47] dark:border-[#2D4A6B] dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-[#1E3A5F]" value={ytdVal} onChange={e=>setYtdVal(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')saveYTD();if(e.key==='Escape')setEditYTD(null);}} placeholder="0"/>
                      <button onClick={saveYTD} className="text-xs text-white bg-[#1E3A5F] px-2 py-1 rounded-lg font-bold hover:bg-[#162d4a]">Save</button>
                      <button onClick={()=>setEditYTD(null)} className="text-xs text-gray-400 hover:text-gray-600 px-1">✕</button>
                    </div>
                  ) : (
                    <button onClick={()=>startEdit(c.code,'ytdExp',c.ytdExp)} className="text-xs text-[#1E3A5F] dark:text-blue-300 hover:underline font-semibold">Update YTD</button>
                  )}
                </div>
                {c.expItems.map(item=>(
                  <div key={item.n} className="flex justify-between text-xs py-1.5 border-b border-gray-100 dark:border-[#2D4A6B]">
                    <span className="text-gray-600 dark:text-gray-300 flex-1 mr-2">{item.n}</span>
                    <span className="font-medium text-[#1E3A5F] dark:text-gray-100 flex-shrink-0">{fmt$(item.p)}</span>
                  </div>
                ))}
                <div className="flex justify-between text-xs pt-2 font-bold border-t border-gray-200 dark:border-[#2D4A6B] mt-1">
                  <span className="text-gray-500">YTD Spent</span>
                  <span className="text-red-500">{fmt$(c.ytdExp||0)} / {fmt$(c.exp2026)}</span>
                </div>
              </div>
              {c.incItems.length>0 && <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Income</p>
                  {editYTD&&editYTD.code===c.code&&editYTD.field==='ytdInc' ? (
                    <div className="flex items-center gap-1">
                      <input type="number" className="w-24 text-xs border rounded-lg px-2 py-1 dark:bg-[#1A2E47] dark:border-[#2D4A6B] dark:text-gray-100 focus:outline-none focus:ring-1 focus:ring-[#1E3A5F]" value={ytdVal} onChange={e=>setYtdVal(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')saveYTD();if(e.key==='Escape')setEditYTD(null);}} placeholder="0"/>
                      <button onClick={saveYTD} className="text-xs text-white bg-[#1E3A5F] px-2 py-1 rounded-lg font-bold hover:bg-[#162d4a]">Save</button>
                      <button onClick={()=>setEditYTD(null)} className="text-xs text-gray-400 hover:text-gray-600 px-1">✕</button>
                    </div>
                  ) : (
                    <button onClick={()=>startEdit(c.code,'ytdInc',c.ytdInc)} className="text-xs text-[#1E3A5F] dark:text-blue-300 hover:underline font-semibold">Update YTD</button>
                  )}
                </div>
                {c.incItems.map(item=>(
                  <div key={item.n} className="flex justify-between text-xs py-1.5 border-b border-gray-100 dark:border-[#2D4A6B]">
                    <span className="text-gray-600 dark:text-gray-300 flex-1 mr-2">{item.n}</span>
                    <span className="font-medium text-green-600 flex-shrink-0">{fmt$(item.p)}</span>
                  </div>
                ))}
                <div className="flex justify-between text-xs pt-2 font-bold border-t border-gray-200 dark:border-[#2D4A6B] mt-1">
                  <span className="text-gray-500">YTD Collected</span>
                  <span className="text-green-600">{fmt$(c.ytdInc||0)} / {fmt$(c.inc2026)}</span>
                </div>
              </div>}
            </div>
          </div>}
        </div>;
      })}
    </div>

    {/* 2025 vs 2026 Comparison */}
    <div className="bg-white dark:bg-[#1A2E47] rounded-xl border border-[#E2E8F0] dark:border-[#2D4A6B] shadow-sm overflow-hidden">
      <div className="px-5 py-3 border-b border-gray-100 dark:border-[#2D4A6B]">
        <h3 className="font-bold text-[#1E3A5F] dark:text-gray-100 text-sm">2025 Actual vs. 2026 Proposed</h3>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead><tr className="border-b border-gray-100 dark:border-[#2D4A6B] bg-gray-50 dark:bg-[#0F1F33]">
            <th className="text-left px-4 py-2.5 font-bold text-gray-500 uppercase tracking-wide">Committee</th>
            <th className="text-right px-4 py-2.5 font-bold text-gray-500 uppercase tracking-wide">2025 Exp</th>
            <th className="text-right px-4 py-2.5 font-bold text-gray-500 uppercase tracking-wide">2026 Exp</th>
            <th className="text-right px-4 py-2.5 font-bold text-gray-500 uppercase tracking-wide">2025 Inc</th>
            <th className="text-right px-4 py-2.5 font-bold text-gray-500 uppercase tracking-wide">2026 Inc</th>
          </tr></thead>
          <tbody>
            {bs.committees.map(c=>(
              <tr key={c.code} className="border-b border-gray-50 dark:border-[#2D4A6B] hover:bg-gray-50 dark:hover:bg-[#2D4A6B]">
                <td className="px-4 py-2.5 font-semibold text-[#1E3A5F] dark:text-gray-100">{c.name}</td>
                <td className="px-4 py-2.5 text-right text-gray-400">{fmt$(c.exp2025)}</td>
                <td className="px-4 py-2.5 text-right font-bold text-red-500">{fmt$(c.exp2026)}</td>
                <td className="px-4 py-2.5 text-right text-gray-400">{c.inc2025>0?fmt$(c.inc2025):'—'}</td>
                <td className="px-4 py-2.5 text-right font-bold text-green-600">{c.inc2026>0?fmt$(c.inc2026):'—'}</td>
              </tr>
            ))}
            <tr className="bg-[#1E3A5F] text-white">
              <td className="px-4 py-3 font-bold">TOTAL</td>
              <td className="px-4 py-3 text-right font-bold">{fmt$(bs.committees.reduce((s,c)=>s+c.exp2025,0))}</td>
              <td className="px-4 py-3 text-right font-bold text-[#C8A951]">{fmt$(totalExp)}</td>
              <td className="px-4 py-3 text-right font-bold">{fmt$(bs.committees.reduce((s,c)=>s+c.inc2025,0))}</td>
              <td className="px-4 py-3 text-right font-bold text-[#C8A951]">{fmt$(totalInc)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>;
}

// ── MAIN APP ─────────────────────────────────────────────────
function App() {
  const [state,dispatch]=useReducer(reducer,{past:[],present:INIT_PRESENT,future:[]});
  const {present}=state;
  const {tasks,milestones,recycleBin,checkpoints,budget}=present;

  const [tab,setTab]=useState('board');
  const [search,setSearch]=useState('');
  const [fPri,setFPri]=useState('All');
  const [fOwner,setFOwner]=useState('All');
  const [fMs,setFMs]=useState('All');
  const [fStatus,setFStatus]=useState('All');
  const [editTask,setEditTask]=useState(null);
  const [adding,setAdding]=useState(false);
  const [showBin,setShowBin]=useState(false);
  const [showRec,setShowRec]=useState(false);
  const [showInfo,setShowInfo]=useState(false);
  const [showWelcome,setShowWelcome]=useState(false);
  const [showWorkload,setShowWorkload]=useState(false);
  const [showSponsor,setShowSponsor]=useState(false);
  const [selected,setSelected]=useState([]);
  const [conf,setConf]=useState(null);
  const [saveStatus,setSaveStatus]=useState('saved');
  const [dark,setDark]=useState(false);
  const [dragOver,setDragOver]=useState(null);
  const {toasts,show:toast}=useToast();
  const saveRef=useRef(null);
  const urlRef=useRef(null);
  const cpRef=useRef(null);

  // Load state
  useEffect(()=>{
    try {
      const hash=window.location.hash.slice(1);
      if(hash){const d=LZString.decompressFromEncodedURIComponent(hash);if(d){const p=JSON.parse(d);if(p&&p.tasks){dispatch({type:'LOAD',state:p});toast('Board loaded from shared link.');return;}}}
    }catch(e){}
    try {
      const s=localStorage.getItem('nfbpa_v7');
      if(s){const p=JSON.parse(s);if(p&&p.tasks){dispatch({type:'LOAD',state:p});return;}}
    }catch(e){}
    setShowWelcome(true);
  },[]);

  // Auto-save
  useEffect(()=>{
    setSaveStatus('saving');
    clearTimeout(saveRef.current);
    saveRef.current=setTimeout(()=>{try{localStorage.setItem('nfbpa_v7',JSON.stringify(present));setSaveStatus('saved');}catch(e){setSaveStatus('error');}},300);
    clearTimeout(urlRef.current);
    urlRef.current=setTimeout(()=>{try{window.history.replaceState(null,'','#'+LZString.compressToEncodedURIComponent(JSON.stringify(present)));}catch(e){}},500);
  },[present]);

  // Auto-checkpoint
  useEffect(()=>{
    cpRef.current=setInterval(()=>dispatch({type:'ADD_CHECKPOINT'}),5*60*1000);
    return ()=>clearInterval(cpRef.current);
  },[]);

  // Dark mode persist
  useEffect(()=>{
    try{const d=localStorage.getItem('nfbpa_dark');if(d)setDark(d==='1');}catch(e){}
  },[]);
  useEffect(()=>{
    try{localStorage.setItem('nfbpa_dark',dark?'1':'0');}catch(e){}
  },[dark]);

  // Keyboard shortcuts
  useEffect(()=>{
    const h=e=>{
      const inInput=e.target.matches('input,textarea,select');
      if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();dispatch({type:'UNDO'});toast('↩ Undone.');}
      else if(((e.ctrlKey||e.metaKey)&&e.key==='y')||((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='z')){e.preventDefault();dispatch({type:'REDO'});toast('↪ Redone.');}
      else if(e.key==='n'&&!inInput&&!e.ctrlKey){setAdding(true);}
      else if(e.key==='f'&&!inInput&&!e.ctrlKey){e.preventDefault();document.querySelector('input[placeholder*="Search"]')?.focus();}
      else if(e.key==='Escape'){setEditTask(null);setAdding(false);setShowBin(false);setShowRec(false);setShowInfo(false);setShowWelcome(false);setShowWorkload(false);setShowSponsor(false);}
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[]);

  // Unsaved warning
  useEffect(()=>{
    const h=e=>{if(saveStatus==='saving'){e.preventDefault();e.returnValue='';}};
    window.addEventListener('beforeunload',h);
    return ()=>window.removeEventListener('beforeunload',h);
  },[saveStatus]);

  const owners=useMemo(()=>[...new Set(tasks.map(t=>t.owner).filter(Boolean))].sort(),[tasks]);
  const filtered=useMemo(()=>{
    const q=search.toLowerCase().trim();
    return tasks.filter(t=>{
      if(q&&!t.title.toLowerCase().includes(q)&&!(t.owner||'').toLowerCase().includes(q)&&!(t.notes||'').toLowerCase().includes(q))return false;
      if(fPri!=='All'&&t.priority!==fPri)return false;
      if(fOwner!=='All'&&t.owner!==fOwner)return false;
      if(fMs!=='All'&&milestones.find(m=>m.id===t.milestone)?.name!==fMs)return false;
      if(fStatus!=='All'&&COLS.find(c=>c.id===t.status)?.label!==fStatus)return false;
      return true;
    });
  },[tasks,search,fPri,fOwner,fMs,fStatus,milestones]);

  const kpi=useMemo(()=>{
    const now=new Date();now.setHours(0,0,0,0);
    const ov=tasks.filter(t=>t.status!=='complete'&&t.due&&new Date(t.due+'T12:00:00')<now).length;
    const tw=tasks.filter(t=>{if(t.status==='complete'||!t.due)return false;const d=daysUntil(t.due);return d>=0&&d<=7;}).length;
    const st=tasks.filter(t=>{if(t.status==='complete')return false;if(!t.due)return false;const d=new Date(t.due+'T12:00:00');return(Date.now()-d)>14*86400000&&(t.progress||0)===0;}).length;
    const done=tasks.filter(t=>t.status==='complete').length;
    return {total:tasks.length,ov,tw,st,pct:tasks.length?Math.round(done/tasks.length*100):0,done};
  },[tasks]);

  const daysToAnniv=daysUntil('2026-06-05');
  const hasFilters=search||fPri!=='All'||fOwner!=='All'||fMs!=='All'||fStatus!=='All';

  function handleDragOver(e,colId) { e.preventDefault(); e.dataTransfer.dropEffect='move'; setDragOver(colId); }
  function handleDrop(e,colId) { e.preventDefault(); const id=e.dataTransfer.getData('text/plain'); if(id){dispatch({type:'MOVE_TASK',id,status:colId});toast('Task moved.');} setDragOver(null); }
  function handleDragLeave(e) { if(!e.currentTarget.contains(e.relatedTarget)) setDragOver(null); }
  function handleSelect(id,checked){setSelected(s=>checked?[...s,id]:s.filter(x=>x!==id));}
  function handleRemove(id){setConf({msg:'Move this task to the Recycle Bin? You can restore it anytime within 30 days.',onYes:()=>{dispatch({type:'SOFT_DELETE',id});toast('Task moved to Recycle Bin.');}});}
  function handleShare(){navigator.clipboard.writeText(window.location.href).then(()=>toast('Link copied! Anyone with this link can view the board.')).catch(()=>toast('Copy the URL from your browser address bar.','warn'));}

  return <div className={dark?'dark':''}>
    <div className="min-h-screen bg-[#F4F6F9] dark:bg-[#0F1F33] text-[#1E3A5F] dark:text-gray-100">
      <Toasts toasts={toasts}/>

      {/* HEADER */}
      <header className="bg-white dark:bg-[#1A2E47] border-b border-[#E2E8F0] dark:border-[#2D4A6B] sticky top-0 z-50 shadow-sm no-print">
        <div className="flex items-center justify-between px-4 py-2 gap-2 flex-wrap">
          {/* Logo + Title */}
          <div className="flex items-center gap-3">
            {LOGO ? <img src={LOGO} alt="NFBPA Greater Houston" className="h-10 w-auto" style={{filter:dark?'invert(1)':'none'}}/> : <div className="font-bold text-[#1E3A5F] text-lg">NFBPA</div>}
            <div className="hidden sm:block">
              <div className="text-xs font-bold text-[#C8A951] leading-none tracking-widest uppercase">NFBPA Houston</div>
              <div className="text-xs text-gray-400">Program Dashboard 2026</div>
            </div>
          </div>

          {/* Action Buttons */}
          <div className="flex items-center gap-1.5 flex-wrap">
            {/* Save status */}
            <div className={`flex items-center gap-1.5 text-xs mr-1 ${saveStatus==='saved'?'text-green-600':saveStatus==='error'?'text-red-500':'text-amber-500'}`}>
              <span className={`w-2 h-2 rounded-full flex-shrink-0 ${saveStatus==='saved'?'bg-green-500':saveStatus==='error'?'bg-red-500':'bg-amber-400 animate-pulse'}`}></span>
              <span className="hidden lg:inline font-medium">{saveStatus==='saved'?'Saved':'Saving...'}</span>
            </div>

            {/* UNDO — prominent gold button */}
            <button onClick={()=>{dispatch({type:'UNDO'});toast('↩ Undone.');}} disabled={!state.past.length}
              className="undo-btn" title="Undo last action (Ctrl+Z)">↩ Undo</button>
            <button onClick={()=>{dispatch({type:'REDO'});toast('↪ Redone.');}} disabled={!state.future.length}
              className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-100 dark:hover:bg-[#2D4A6B] disabled:opacity-30 transition-colors font-medium" title="Redo (Ctrl+Y)">↪ Redo</button>

            {/* Add Task */}
            <button onClick={()=>setAdding(true)} className="px-3 py-1.5 bg-[#1E3A5F] text-white rounded-lg text-xs font-bold hover:bg-[#162d4a] transition-colors" title="Add new task (press N)">+ Add Task</button>

            {/* Share */}
            <button onClick={handleShare} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Copy shareable link">🔗 Share</button>

            {/* Export */}
            <button onClick={()=>{exportCSV(tasks,milestones);toast('CSV downloaded.');}} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Export tasks to CSV">⬇ Export</button>

            {/* Workload */}
            <button onClick={()=>setShowWorkload(true)} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="View owner workload">👤 Workload</button>

            {/* Sponsor Tracker */}
            <button onClick={()=>setShowSponsor(true)} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Sponsorship progress tracker">💼 Sponsors</button>

            {/* Bin */}
            <button onClick={()=>setShowBin(true)} className="relative px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Recycle Bin — restore removed tasks">
              🗑 Bin{recycleBin.length>0&&<span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center font-bold">{recycleBin.length}</span>}
            </button>

            {/* Recover */}
            <button onClick={()=>setShowRec(true)} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Restore board to an earlier auto-saved state">🔄 Recover</button>

            {/* Info */}
            <button onClick={()=>setShowInfo(true)} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors font-medium" title="Board roster, sponsors, calendar, help">🏛 Info</button>

            {/* Dark mode */}
            <button onClick={()=>setDark(d=>!d)} className="px-2.5 py-1.5 text-xs border border-[#E2E8F0] dark:border-[#2D4A6B] rounded-lg hover:bg-gray-50 dark:hover:bg-[#2D4A6B] transition-colors" title="Toggle dark/light mode">{dark?'☀️':'🌙'}</button>
          </div>
        </div>
      </header>

      {/* ANNIVERSARY BANNER */}
      <div className="bg-[#1E3A5F] text-white px-5 py-3 no-print">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div>
            <span className="text-[#C8A951] font-bold text-sm">🎉 40th Anniversary Weekend — June 5–7, 2026</span>
            <span className="text-blue-200 text-xs ml-3 hidden md:inline">Fri: Welcome Social · Sat: Public Admin Day + Find Your Vibe · Sun: Leadership Panel + Luncheon (10 Awards)</span>
          </div>
          <div className="text-right flex-shrink-0">
            <div className="text-[#C8A951] font-bold text-xl">{daysToAnniv !== null && daysToAnniv > 0 ? daysToAnniv+' days away' : daysToAnniv===0 ? 'Today!' : 'Event has passed'}</div>
            <div className="text-blue-200 text-xs">Event Budget: $7,500 · 2026 Total Budget: $95,658</div>
          </div>
        </div>
      </div>

      {/* TAB BAR */}
      <div className="bg-white dark:bg-[#1A2E47] border-b border-[#E2E8F0] dark:border-[#2D4A6B] px-4 no-print">
        <div className="flex">
          {[['board','📋 Task Board'],['budget','💰 Budget & Finance']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`py-3 px-5 text-sm font-semibold border-b-2 transition-colors ${tab===id?'border-[#C8A951] text-[#1E3A5F] dark:text-gray-100':'border-transparent text-gray-400 hover:text-gray-600 dark:hover:text-gray-300'}`}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {tab==='board' && <>
        {/* KPI TILES */}
        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 px-4 py-3 no-print">
          {[
            {label:'Total Tasks',value:kpi.total,sub:kpi.done+' complete',color:'text-[#1E3A5F] dark:text-gray-100'},
            {label:'Overdue',value:kpi.ov,sub:'Past due date',color:kpi.ov>0?'text-red-600':'text-gray-300'},
            {label:'Due This Week',value:kpi.tw,sub:'Next 7 days',color:kpi.tw>0?'text-yellow-600':'text-gray-300'},
            {label:'Stale Tasks',value:kpi.st,sub:'No progress 14+ days',color:kpi.st>0?'text-gray-500':'text-gray-300'},
            {label:'Overall Progress',value:kpi.pct+'%',sub:'Tasks marked complete',color:'text-[#C8A951]'},
          ].map(k=>(
            <div key={k.label} className="bg-white dark:bg-[#1A2E47] rounded-xl border border-[#E2E8F0] dark:border-[#2D4A6B] p-4 shadow-sm">
              <div className={`text-2xl font-bold ${k.color}`}>{k.value}</div>
              <div className="text-xs font-semibold text-gray-500 mt-0.5">{k.label}</div>
              <div className="text-xs text-gray-400">{k.sub}</div>
            </div>
          ))}
        </div>

        {/* FILTERS */}
        <div className="px-4 pb-3 flex flex-wrap gap-2 items-center no-print">
          <div className="relative flex-1 min-w-44">
            <input className="w-full pl-4 pr-3 py-2 border border-[#E2E8F0] dark:border-[#2D4A6B] dark:bg-[#1A2E47] dark:text-gray-100 rounded-xl text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#1E3A5F] placeholder-gray-300"
              placeholder="Search tasks, owners, or notes..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          {[
            {val:fPri,set:setFPri,opts:['All Priorities','Critical','High','Medium','Low'],map:v=>v==='All Priorities'?'All':v},
            {val:fOwner,set:setFOwner,opts:['All Owners',...owners],map:v=>v==='All Owners'?'All':v},
            {val:fMs,set:setFMs,opts:['All Milestones',...milestones.map(m=>m.name)],map:v=>v==='All Milestones'?'All':v},
            {val:fStatus,set:setFStatus,opts:['All Statuses',...COLS.map(c=>c.label)],map:v=>v==='All Statuses'?'All':v},
          ].map((f,i)=>(
            <select key={i} className="border border-[#E2E8F0] dark:border-[#2D4A6B] dark:bg-[#1A2E47] dark:text-gray-100 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#1E3A5F]"
              value={f.val==='All'?f.opts[0]:f.val} onChange={e=>f.set(f.map(e.target.value))}>
              {f.opts.map(o=><option key={o}>{o}</option>)}
            </select>
          ))}
          {hasFilters && <button onClick={()=>{setSearch('');setFPri('All');setFOwner('All');setFMs('All');setFStatus('All');}}
            className="text-xs text-gray-400 hover:text-red-500 px-2 py-2 transition-colors font-medium">✕ Clear Filters</button>}
          <span className="text-xs text-gray-400 ml-1 font-medium">{filtered.length} of {tasks.length} tasks</span>
        </div>

        {/* BULK ACTIONS */}
        {selected.length>0 && (
          <div className="mx-4 mb-3 flex items-center gap-3 bg-[#1E3A5F] text-white px-4 py-2.5 rounded-xl text-sm no-print">
            <span className="font-semibold">{selected.length} task{selected.length>1?'s':''} selected</span>
            <button onClick={()=>{dispatch({type:'BULK_COMPLETE',ids:selected});toast(selected.length+' task(s) marked complete.');setSelected([]);}}
              className="px-3 py-1.5 bg-green-500 rounded-lg text-xs font-bold hover:bg-green-600 transition-colors">✓ Mark Complete</button>
            <button onClick={()=>setConf({msg:'Move '+selected.length+' task(s) to the Recycle Bin?',onYes:()=>{dispatch({type:'BULK_REMOVE',ids:selected});toast(selected.length+' task(s) moved to Recycle Bin.');setSelected([]);}})}
              className="px-3 py-1.5 bg-red-500 rounded-lg text-xs font-bold hover:bg-red-600 transition-colors">Remove Selected</button>
            <button onClick={()=>setSelected([])} className="ml-auto text-blue-200 hover:text-white text-xs font-medium">Deselect All</button>
          </div>
        )}

        {/* KANBAN BOARD */}
        <div className="flex gap-3 px-4 pb-10 overflow-x-auto hide-scrollbar">
          {COLS.map(col=>{
            const colTasks=filtered.filter(t=>t.status===col.id);
            const isOver = dragOver===col.id;
            return <div key={col.id} className="col-w flex-shrink-0">
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-2">
                  <div className="w-3 h-3 rounded-full" style={{background:col.color}}></div>
                  <span className="text-sm font-bold text-[#1E3A5F] dark:text-gray-200">{col.label}</span>
                </div>
                <span className="text-xs bg-gray-100 dark:bg-[#2D4A6B] text-gray-500 dark:text-gray-400 px-2 py-0.5 rounded-full font-bold">{colTasks.length}</span>
              </div>
              <div className="w-full h-1 rounded-full mb-3" style={{background:col.color+'22'}}>
                <div className="h-1 rounded-full transition-all duration-500" style={{background:col.color,width:tasks.length?Math.round(colTasks.length/Math.max(tasks.length,1)*100)+'%':'0%'}}></div>
              </div>
              <div
                onDragOver={e=>handleDragOver(e,col.id)}
                onDrop={e=>handleDrop(e,col.id)}
                onDragLeave={handleDragLeave}
                className={`min-h-24 rounded-xl transition-all p-1 ${isOver?'drag-over':''}`}
              >
                {colTasks.length===0 && !isOver && (
                  <div className="text-center py-8 text-gray-200 dark:text-gray-600 text-xs border-2 border-dashed border-gray-100 dark:border-[#2D4A6B] rounded-xl">
                    <div className="text-2xl mb-1">○</div>
                    <p>Drop tasks here</p>
                  </div>
                )}
                {colTasks.map((task)=>(
                  <TaskCard key={task.id} task={task} milestones={milestones}
                    onEdit={t=>setEditTask(t)} onRemove={handleRemove}
                    onMove={(id,status)=>{dispatch({type:'MOVE_TASK',id,status});toast('Task moved.');}}
                    selected={selected.includes(task.id)} onSelect={handleSelect}/>
                ))}
              </div>
            </div>;
          })}
        </div>
      </>}

      {tab==='budget' && <BudgetTab budget={budget} dispatch={dispatch} toast={toast}/>}

      {/* MODALS */}
      {(adding||editTask) && <TaskModal task={editTask||null} milestones={milestones}
        onSave={task=>{if(editTask){dispatch({type:'UPDATE_TASK',task});toast('Task saved.');}else{dispatch({type:'ADD_TASK',task});toast('New task added to the board.');}}}
        onClose={()=>{setEditTask(null);setAdding(false);}}/>}
      {showBin && <RecycleBin bin={recycleBin}
        onRestore={id=>{dispatch({type:'RESTORE_TASK',id});toast('Task restored to the board.');}}
        onPurge={id=>dispatch({type:'PURGE_TASK',id})}
        onEmpty={()=>{dispatch({type:'EMPTY_BIN'});toast('Recycle bin emptied.');}}
        onClose={()=>setShowBin(false)}/>}
      {showRec && <Recovery checkpoints={checkpoints}
        onRestore={snapshot=>{dispatch({type:'RESTORE_CP',snapshot});toast('Board restored from recovery point.');}}
        onClose={()=>setShowRec(false)}/>}
      {showInfo && <BoardInfo onClose={()=>setShowInfo(false)}/>}
      {showWelcome && <WelcomeBanner onClose={()=>setShowWelcome(false)}/>}
      {showWorkload && <WorkloadView tasks={tasks} milestones={milestones} onClose={()=>setShowWorkload(false)}/>}
      {showSponsor && <SponsorTracker tasks={tasks} onClose={()=>setShowSponsor(false)}/>}
      {conf && <Confirm msg={conf.msg} onYes={()=>{conf.onYes();setConf(null);}} onNo={()=>setConf(null)}/>}
    </div>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
